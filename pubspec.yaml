name: attendify
description: "Attendify — Aplikasi absensi karyawan berbasis QR Code."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────
  # flutter_bloc: mengelola state dengan pattern Event → Bloc → State
  # equatable: agar Bloc bisa membandingkan state lama vs baru tanpa boilerplate
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # ── Networking ────────────────────────────────────────────────────
  # dio: HTTP client yang powerful (interceptors, cancel token, retry)
  dio: ^5.7.0

  # ── Dependency Injection ──────────────────────────────────────────
  # get_it: service locator — tempat register semua dependencies
  get_it: ^8.0.3

  # ── QR Code Scanner ──────────────────────────────────────────────
  # mobile_scanner: scanner berbasis MLKit, modern & well-maintained
  mobile_scanner: ^6.0.0

  # ── Local Storage ─────────────────────────────────────────────────
  # shared_preferences: simpan data sederhana (setting, cache ringan)
  # flutter_secure_storage: simpan data sensitif (token) terenkripsi
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # ── Functional Programming ───────────────────────────────────────
  # dartz: Either<Failure, Success> — error handling tanpa throw exception
  dartz: ^0.10.1

  # ── Utilities ─────────────────────────────────────────────────────
  # intl: format tanggal & waktu (DateFormat)
  # google_fonts: load font Inter dari Google Fonts
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Testing ───────────────────────────────────────────────────────
  # bloc_test: helper untuk test Bloc state transitions
  # mocktail: mock dependencies tanpa code generation
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
